version: '{build}'
skip_tags: true
branches:
  only:
    - /.*/
image: Visual Studio 2022
configuration: Release
dotnet_csproj:
  patch: true
  file: '**\*.csproj'
  version: '{version}'
  package_version: '{version}'
  assembly_version: '{version}'
  file_version: '{version}'
  informational_version: '{version}'
before_build:
  - nuget restore
test_script:
  - dotnet test .\Common.Logging.Scopes.Tests\Common.Logging.Scopes.Tests.csproj -c %configuration% --no-build
  - dotnet test .\Common.Logging.NLog53.Tests\Common.Logging.NLog53.Tests.csproj -c %configuration% --no-build
build:
  publish_nuget: true
  publish_nuget_symbols: true
  use_snupkg_format: true
  verbosity: normal
deploy:
- provider: NuGet
  name: production
  api_key:
    secure: BnBM3rYWYm/hdI6ycXSgkg2qvx7z7aB3wiFryOVAaJE2n1bIAnmTQMf9FD749xZh
  on:
    branch: master
notifications:
  - provider: Email
    to:
      - '{{commitAuthorEmail}}'
    on_build_success: true
    on_build_failure: true
    on_build_status_changed: true
